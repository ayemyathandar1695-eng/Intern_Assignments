<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body {
           
            background-color: rgb(156, 209, 192);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: aliceblue;
            display: flex;
            gap: 30px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .herosection {
            background-color: rgb(174, 197, 140);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .domclass {
            background-color: bisque;
            padding: 20px;
            border-radius: 8px;
            min-width: 200px;
        }

        /* Form styling */
        input[type="text"] {
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
        }

        .output-card {
            background-color: #7fa9c3; 
            padding: 15px;
            border-radius: 8px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Update Section -->
        <section class="herosection">
            <h2>Update</h2>
            
            <label for="inputName">Name:</label>
            <input type="text" id="inputName" title="name" value="Hello" />

            <label for="inputAge">Age:</label>
            <input type="text" id="inputAge" title="inputAge" value="10" />

            <label for="inputCheck">Check:</label>
            <input type="checkbox" id="inputCheck" title="inputCheck" />
        </section>

        <!-- Live DOM Output Section -->
        <section class="domclass">
            <h2>Live DOM</h2>
            <div class="output-card">
                <h2 id="displayName">Name: Hello</h2>
                <p>Age: <span id="displayAge">10</span></p>
            </div>
        </section>
    </div>

    <script>
        
        const inputName = document.getElementById('inputName');
        const inputAge = document.getElementById('inputAge');
        const displayName = document.getElementById('displayName');
        const displayAge = document.getElementById('displayAge');

        inputName.addEventListener('input', (e) => {
            displayName.innerText = target.value;
        });

        inputAge.addEventListener('input', (e) => {
            displayAge.innerText = e.target.value;
        });
    </script>

</body>
</html>
