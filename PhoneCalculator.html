<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator UI</title>
    <link rel="stylesheet" href="style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
           box-sizing: border-box;
           font-family: Arial, sans-serif;
           }

      body {
           display: flex;
           justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fbe9e9;
           }

      .calculator {
           width: 320px;
           background-color: #ffffff;
           padding: 20px;
           border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
          }

     .display {
          height: 150px;
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
        font-size: 48px;
        color: #4a6fa5; /* ပုံထဲက blue tone */
        padding-top: 20px;
        padding-right: 10px;
        }

    .button-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
        }

    .row {
         display: flex;
         justify-content: space-between;
        gap: 10px;
        }

     button {
          flex: 1;
          height: 60px;
          border: none;
          background: transparent;
          font-size: 20px;
          font-weight: 500;
          color: #555;
          cursor: pointer;
          display: flex;
          justify-content: center;
          align-items: center;
    
        }
  
        button:active {
        background-color: #f5f5f5;
        border-radius: 50%;
        }


       .text-orange { color: #e67e22; }
       .text-blue { color: #5dade2; font-size: 24px; }

        .equal {
          background-color: #d9534f; 
         color: white !important;
         border-radius: 50%;
         width: 60px;
         height: 60px;
         }


    </style>

</head>
<body>

    <div class="calculator">
        <div class="display">0</div>

        <div class="button-container">
            <div class="row">
                <button class="text-orange">C</button>
                <button class="text-orange">⌫</button>
                <button class="text-blue">%</button>
                <button class="text-blue">÷</button>
            </div>
            <div class="row">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="text-blue">×</button>
            </div>
            <div class="row">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="text-blue">−</button>
            </div>
            <div class="row">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="text-blue">+</button>
            </div>
            <div class="row">
                <button>( )</button>
                <button>0</button>
                <button>.</button>
                <button class="equal">=</button>
            </div>
        </div>
    </div>

</body>
</html>
