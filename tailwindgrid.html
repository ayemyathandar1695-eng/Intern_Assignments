<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <main class="bg-slate-300 grid  sm:grid-cols-1 md:grid-cols-3  grid-cols-4 p-4 rounded-lg gap-4 justify-center">
      <div class="bg-white rounded-lg">
        <p class=" bg-yellow-200 p-4 px-2 py-1 rounded-lg  tracking-tighter mb-4 w-10">💌</p>
        <p class="font-extrabold  rounded-lg">2.4k</p>
        <p>Page View</p>
      </div>

      <div class="bg-white rounded-lg">
        <p class=" bg-yellow-200 p-4 px-2 py-1 rounded-lg tracking-tighter mb-4 w-10">💕</p>
        <p class="font-extrabold">$3.4k</p>
        <p>Revenue</p>
      </div>

      <div class="bg-white rounded-lg">
        <p class=" bg-yellow-200 p-4 px-2 py-1  rounded-lg  tracking-tighter mb-4 w-10">💎</p>
        <p class="font-extrabold">298</p>
        <p>New user</p>
      </div>

      <div class="bg-white rounded-lg">
        <p class=" bg-yellow-400 p-4 px-2 py-1 rounded-lg tracking-tighter mb-4 w-10">⭐</p>
        <p class="font-extrabold">4.9</p>
        <p>Rating</p>
      </div>
    </main>
  </body>
</html>
