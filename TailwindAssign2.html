<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Variables UI - Tailwind</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100 flex items-center justify-center p-20">

  <div class="bg-blue-200 rounded-md border border-gray-200 p-10 flex gap-12  ">

    <div class="flex-1">
      <h2 class="text-2xl font-bold text-gray-800 mb-8">Update Variables</h2>


      <label class="block text-sm font-bold text-gray-700 mb-2">Name (String):</label>
      <input type="text" value="Alex Walker" class="p-3 bg-gray-50 border border-gray-200 rounded-lg ">

      <label class="block text-sm font-bold text-gray-700 mb-2">Age (Number):</label>
      <input type="number" value="28" class=" p-3 bg-gray-50 border border-gray-200 rounded-lg ">

      <label class="block text-sm font-bold text-gray-700 mb-2">VIP Status (Boolean):</label>
      <input type="checkbox" checked class="w-5 h-5 accent-blue-600 cursor-pointer">

      <label class="block text-sm font-bold text-gray-700 mb-2">Card Color:</label>

      <div class="w-16 h-8 bg-gray-200 rounded border border-gray-300 flex items-center justify-center">
        <div class="w-6 h-1 bg-gray-400 rounded"></div>
      </div>
    </div>

    <!-- Right Section-->
    <div class="flex-1">
      <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center">Live DOM Output</h2>

      <div class="flex justify-center mt-4">

        <div class="w-40 p-6 border-4 border-black-1000 rounded-2xl bg-white ">

          <span class="  bg-yellow-400 text-[10px] font-bold  rounded-lg  tracking-tighter mb-4">
            VIP Member
          </span>

          <h3 class="text-20px font-bold text-gray-800">Alex Walker</h3>

          <p class="text-gray-500 mt-2">Age: 28</p>

        </div>
      </div>
    </div>

  </div>
  </div>

</body>

</html>
