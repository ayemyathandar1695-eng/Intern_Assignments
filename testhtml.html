<!DOCTYPE html>
<html>
<head>
    <title>Simple HTML Layout</title>
</head>
<body>

    
    <table width="100%" border="0">
        <tr>
            
            <td width="50%" valign="top">
                <h2>Update Variables</h2>
                
                <p>Name (String):<br>
                <input type="text" value=" "></p>

                <p>Age (Number):<br>
                <input type="number" value=""></p>

                <p>VIP Status (Boolean):<br>
                <input type="text" value=""></p>

                <p>Card Color:<br>
                <input type="color" value="#74a0c1"></p>
            </td>

            
            <td width="50%" valign="top">
                <h2>Live DOM Output</h2>
                
                
                <div style="background-color: #74a0c1; color: white; padding: 20px; border-radius: 10px; width: 200px;">
                    <b style="font-size: 20px;">Aye Myat</b><br>
                    <span>Age: 20</span>
                </div>
            </td>
        </tr>
    </table>

</body>
</html>
