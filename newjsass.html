<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calculator</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: #f4f7f9;
            min-height: 500px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator-card {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        input, select {
            width: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            text-align: center;
        }

        
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            
        }

         .result-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
        }

        #final-result {
            color: #28a745;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>Mini Calculator</h2>
        
        <div class="input-group">
            <input type="number" id="num1" >
            
            <select id="op">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            
            <input type="number" id="num2" >
        </div>

        <button onclick="doCalculate()">Calculate Amount</button>

        <div class="result-box">
            <span>Result:</span>
            <span id="final-result">0</span>
        </div>
    </div>

    <script>
        function doCalculate() {
            
            const n1 = document.getElementById('num1').value;
            const n2 = document.getElementById('num2').value;
            const operator = document.getElementById('op').value;
            
            
            const num1 = Number(n1);
            const num2 = Number(n2);
            let total = 0;

           
            if (operator === '+') {
                total = num1 + num2;
            } else if (operator === '-') {
                total = num1 - num2;
            } else if (operator === '*') {
                total = num1 * num2;
            } else if (operator === '/') {
                
                if (num2 !== 0) {
                    total = num1 / num2;
                    
                    if (!Number.isInteger(total)) {
                        total = total.toFixed(2);
                    }
                } else {
                    total = "Error ";
                }
            }
            
            document.getElementById('final-result').innerText = total;
        }
    </script>

</body>
</html>
